version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pharma_field_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-pharma_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-pharma_pass}
      POSTGRES_DB: ${DB_NAME:-pharma_field_db}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-pharma_user} -d ${DB_NAME:-pharma_field_db}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: pharma_field_api
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://${DB_USER:-pharma_user}:${DB_PASSWORD:-pharma_pass}@postgres:5432/${DB_NAME:-pharma_field_db}
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  uploads_data:
